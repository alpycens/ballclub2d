<title>BallClub2D</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.2/peerjs.min.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#1B2125; font-family:'Segoe UI', Arial, sans-serif; color:#E8E8E8;
         display:flex; flex-direction:column; align-items:center; min-height:100vh; }
  #menu { margin-top:60px; background:#252E33; border:1px solid #3C4A52; border-radius:8px;
          padding:28px 34px; width:380px; }
  #menu h1 { font-size:26px; letter-spacing:1px; margin-bottom:4px; color:#CDE6B4; }
  #menu .sub { font-size:12px; color:#8FA0A8; margin-bottom:20px; }
  #menu label { display:block; font-size:12px; color:#9FB3BB; margin:12px 0 4px; }
  #menu input, #menu select { width:100%; padding:8px 10px; background:#1B2125; color:#E8E8E8;
          border:1px solid #3C4A52; border-radius:4px; font-size:14px; outline:none; }
  #menu input:focus, #menu select:focus { border-color:#CDE6B4; }
  #settings { margin-top:16px; padding:10px 12px 12px; background:#1F272C;
              border:1px solid #3C4A52; border-radius:6px; }
  #settings .settitle { font-size:11px; letter-spacing:2px; color:#CDE6B4; }
  #settings label { margin:8px 0 2px; }
  #settings label span { color:#E5B356; font-weight:600; }
  #menu input[type=range] { padding:0; height:20px; accent-color:#5B8C3E; border:none; }
  .btnrow { display:flex; gap:8px; margin-top:18px; }
  button { flex:1; padding:10px 0; border:none; border-radius:4px; font-size:14px; font-weight:600;

  button:hover { background:#4C5E68; }
  button.primary { background:#5B8C3E; }
  button.primary:hover { background:#6BA34B; }
  #joinRow { display:none; margin-top:10px; }
  #joinRow input { text-transform:uppercase; }
  #menuMsg { margin-top:12px; font-size:12px; color:#E5B356; min-height:16px; }
  #gameWrap { display:none; flex-direction:column; align-items:center; margin-top:12px; position:relative; }
  #topRight { display:flex; align-items:center; gap:8px; }

  #setPanel { display:none; position:absolute; top:44px; right:0; z-index:10; width:250px;

  #setPanel label span { color:#E5B356; font-weight:600; }
  #setPanel input[type=password] { width:100%; padding:7px 9px; background:#1B2125; color:#E8E8E8;
              border:1px solid #3C4A52; border-radius:4px; font-size:14px; outline:none; }
  #setPanel input[type=range] { width:100%; height:20px; accent-color:#5B8C3E; }
  #setPanel button { width:100%; margin-top:10px; padding:8px 0; font-size:13px; }
  #pwMsg { font-size:11px; color:#E5B356; min-height:14px; margin-top:6px; }
  #keyPanel { display:none; position:absolute; top:44px; right:0; z-index:11; width:250px;
              background:#252E33; border:1px solid #3C4A52; border-radius:8px; padding:14px 16px;
              box-shadow:0 6px 18px rgba(0,0,0,0.45); }
  .keyRow { display:flex; align-items:center; justify-content:space-between; margin:6px 0; }
  .keyRow span { font-size:13px; color:#9FB3BB; }
  .keyRow button { flex:0 0 auto; width:110px; padding:6px 0; font-size:12px; font-family:monospace; }
  .keyRow button.listen { background:#5B8C3E; }
  #keyReset { width:100%; margin-top:10px; padding:7px 0; font-size:12px; }
  #keyNote { font-size:10px; color:#6E8089; margin-top:8px; }
  #pauseBtn2 { background:#7A5C2E; }
  #pauseBtn2:hover { background:#8F6C36; }
  #topBar { width:1000px; display:flex; align-items:center; justify-content:space-between;
            background:#252E33; border:1px solid #3C4A52; border-bottom:none;
            border-radius:8px 8px 0 0; padding:6px 14px; }
  #scoreBox { font-size:18px; font-weight:700; display:flex; align-items:center; gap:10px; }
  .tdot { width:12px; height:12px; border-radius:50%; display:inline-block; }
  #roomInfo { font-size:12px; color:#9FB3BB; user-select:all; }
  canvas { background:#5E7A4D; display:block; border:1px solid #3C4A52; }
  #botBar { width:1000px; display:flex; align-items:center; justify-content:space-between;
            background:#252E33; border:1px solid #3C4A52; border-top:none;
            border-radius:0 0 8px 8px; padding:8px 14px; }
  #stamWrap { display:flex; align-items:center; gap:8px; font-size:12px; color:#9FB3BB; }
  #stamOuter { width:180px; height:12px; background:#1B2125; border:1px solid #3C4A52; border-radius:6px; overflow:hidden; }
  #stamFill { height:100%; width:100%; background:#E5B356; transition:width .08s linear; }
  #ctrlHint { font-size:11px; color:#6E8089; }
  #leaveBtn { flex:0 0 auto; width:110px; padding:6px 0; font-size:12px; background:#7A3C3C; }
  #leaveBtn:hover { background:#914848; }

<body>

<div id="menu">
  <h1>BALLCLUB2D</h1>
  <div class="sub">Botlu 2D futbol · WASD/Yön hareket · X pas · Space şut · Shift sprint</div>
  <label>Takma adın</label>

  <div id="topBar">
    <div id="scoreBox">
      <span class="tdot" style="background:#E56E56"></span><span id="scR">0</span>

    <div id="stamWrap">SPRINT <div id="stamOuter"><div id="stamFill"></div></div></div>
    <div id="ctrlHint">WASD/Yön: hareket · X: pas (topsuzken bottan pas iste) · Space: şut · Shift: sprint</div>
    <button id="leaveBtn">Menüye Dön</button>
  </div>
</div>

<script>
"use strict";
/* ================= SABİTLER ================= */
var W = 1000, H = 520;
var PX0 = 55, PX1 = 945, PY0 = 55, PY1 = 465;      // saha çizgileri
var GOAL_H = 150, GY0 = (PY0+PY1)/2 - GOAL_H/2, GY1 = (PY0+PY1)/2 + GOAL_H/2;
var fieldSize = 'big';
var GOAL_DEPTH = 34;
var PR = 15, BR = 8;                                // yarıçaplar
var KICK_RANGE = PR + BR + 6;
var ACC = 0.30, PDAMP = 0.925, BASE_MAX = 2.55, SPRINT_MAX = 3.7;
var BDAMP = 0.992, BOUNCE = 0.82;
var SHOOT_SPD = 9.5, PASS_SPD = 6.8;
var STAM_MAX = 100, STAM_DRAIN = 38, STAM_REGEN = 17, STAM_UNLOCK = 25;
var SPD_P = 1, SPD_B = 1;                           // ayarlar: oyuncu / top hizi carpani
var AIM_BASE = 0.14, AIM_M = 1;                     // imlec (nisan) donus hizi rad/kare ve carpani
var TICK_MS = 1000/60, NET_MS = 1000/30;

/* ================= DURUM ================= */
var role = null;            // 'host' | 'client'
var roomCode = null;        // kurulan/katilinan oda kodu
var SET_PW = '0623';        // ayar paneli sifresi
var setUnlocked = false;
var peer = null, conns = {}, hostConn = null;
var myPid = null, myName = 'Oyuncu';
var teamSize = 3, maxGoals = 5, myTeamPref = 'auto';
var G = null;               // oyun durumu (host'ta gerçek, client'ta hedef)
var Gr = null;              // client render (yumuşatılmış)
var keys = { u:0, d:0, l:0, r:0, s:0 };
var lastSentKeys = '';
var running = false, lastT = 0, acc = 0, netAcc = 0;

var cv = document.getElementById('cv'), ctx = cv.getContext('2d');

function setField(fs){
  fieldSize = fs;
  if(fs==='small'){ W=760; H=400; GOAL_H=115; }
  else if(fs==='huge'){ W=1240; H=650; GOAL_H=190; }
  else { fieldSize='big'; W=1000; H=520; GOAL_H=150; }
  PX0=55; PX1=W-55; PY0=55; PY1=H-55;
  GY0=(PY0+PY1)/2-GOAL_H/2; GY1=(PY0+PY1)/2+GOAL_H/2;
  if(cv){ cv.width=W; cv.height=H; }
  el('topBar').style.width=W+'px';
  el('botBar').style.width=W+'px';
}

/* ================= YARDIMCI ================= */
function rnd(a,b){ return a + Math.random()*(b-a); }
function dist(a,b){ var dx=a.x-b.x, dy=a.y-b.y; return Math.sqrt(dx*dx+dy*dy); }
function code5(){ var c='ABCDEFGHJKLMNPRSTUVYZ123456789', s=''; for(var i=0;i<5;i++) s+=c[Math.floor(Math.random()*c.length)]; return s; }
function el(id){ return document.getElementById(id); }

/* ================= OYUN KURULUMU (HOST) ================= */
function newPlayer(id, name, team, bot){
  return { id:id, name:name, team:team, bot:bot,
           x:0, y:0, vx:0, vy:0, fx: team===0?1:-1, fy:0, aim: team===0?0:Math.PI,
           stamina:STAM_MAX, lock:false, kcd:0, passReq:0, flash:0,
           in:{u:0,d:0,l:0,r:0,s:0}, ev:[] };
}

function initGame(){
  G = { players:[], ball:{x:W/2,y:H/2,vx:0,vy:0,cw:null,ct:0}, score:[0,0],
        phase:'play', ptimer:0, msg:'', over:false, paused:false,
        koTeam:0, ko:true };
  // host kendi sectigi takimda (otomatik = kirmizi)
  var hostTeam = myTeamPref==='1' ? 1 : 0;
  G.players.push(newPlayer(myPid, myName, hostTeam, false));
  fillBots();
  resetPositions();
}

function fillBots(){
  var names0 = ['Bot Kaya','Bot Demir','Bot Aslan','Bot Yildiz'];
  var names1 = ['Bot Celik','Bot Sahin','Bot Kurt','Bot Kartal'];
  for(var t=0;t<2;t++){
    var cnt = G.players.filter(function(p){return p.team===t;}).length;
    var pool = t===0?names0:names1, ni=0;
    while(cnt < teamSize){
      var nm = pool[ni%pool.length]; ni++;
      if(G.players.some(function(p){return p.name===nm;})) nm += '2';
      G.players.push(newPlayer('bot'+t+'_'+Math.random().toString(36).slice(2,7), nm, t, true));
      cnt++;
    }
  }
}

function trimBots(){
  // her takımda teamSize'ı aşan botları çıkar
  for(var t=0;t<2;t++){
    var team = G.players.filter(function(p){return p.team===t;});
    var extra = team.length - teamSize;
    for(var i=G.players.length-1; i>=0 && extra>0; i--){
      if(G.players[i].team===t && G.players[i].bot){ G.players.splice(i,1); extra--; }
    }
  }
}

function resetPositions(){
  G.ball.x = W/2; G.ball.y = H/2; G.ball.vx = 0; G.ball.vy = 0;
  G.ball.cw = null; G.ball.ct = 0;
  G.ko = true;
  for(var t=0;t<2;t++){
    var team = G.players.filter(function(p){return p.team===t;});
    for(var i=0;i<team.length;i++){
      var p = team[i];
      var frac = (i+1)/(team.length+1);
      p.y = PY0 + frac*(PY1-PY0);
      p.x = t===0 ? PX0 + 130 + (i%2)*70 : PX1 - 130 - (i%2)*70;
      p.vx = 0; p.vy = 0; p.aim = t===0?0:Math.PI;
      p.fx = Math.cos(p.aim); p.fy = Math.sin(p.aim);
    }
  }
}

/* ================= FİZİK (HOST) ================= */
function stepGame(dt){ // dt: 60fps kare cinsinden (~1)
  if(G.phase==='goal' || G.phase==='end'){
    G.ptimer -= dt*TICK_MS;
    if(G.ptimer<=0){
      if(G.phase==='end'){ G.score=[0,0]; }
      G.phase='play'; G.msg='';
      resetPositions();
    }
    // duraklamada da hafif top sürtünmesi olsun
  }
  var play = (G.phase==='play');

  // botların girişlerini hesapla
  if(play) botThink();

  // oyuncular
  for(var i=0;i<G.players.length;i++){
    var p = G.players[i];
    p.kcd = Math.max(0, p.kcd - dt*TICK_MS);
    p.passReq = Math.max(0, p.passReq - dt*TICK_MS);
    p.flash = Math.max(0, p.flash - dt*TICK_MS);
    var inp = play ? p.in : {u:0,d:0,l:0,r:0,s:0};
    var mx = (inp.r?1:0) - (inp.l?1:0);
    var my = (inp.d?1:0) - (inp.u?1:0);
    var moving = (mx!==0 || my!==0);
    if(moving){
      var mlen=Math.sqrt(mx*mx+my*my); mx/=mlen; my/=mlen;
      // nisan noktasi 360 derece yumusak doner; hizi AIM_M ile ayarlanir
      var tgt = Math.atan2(my, mx);
      var diff = tgt - p.aim;
      while(diff > Math.PI) diff -= Math.PI*2;
      while(diff < -Math.PI) diff += Math.PI*2;
      var step = AIM_BASE * AIM_M * dt;
      if(Math.abs(diff) <= step) p.aim = tgt;
      else p.aim += (diff>0?1:-1)*step;
      p.fx = Math.cos(p.aim); p.fy = Math.sin(p.aim);
    }

    // sprint / stamina
    var sprinting = inp.s && moving && !p.lock && p.stamina>0;
    if(sprinting){
      p.stamina -= STAM_DRAIN * dt*TICK_MS/1000;
      if(p.stamina<=0){ p.stamina=0; p.lock=true; }
    } else {
      p.stamina = Math.min(STAM_MAX, p.stamina + STAM_REGEN*dt*TICK_MS/1000);
      if(p.lock && p.stamina>=STAM_UNLOCK) p.lock=false;
    }
    var maxv = (sprinting ? SPRINT_MAX : BASE_MAX) * SPD_P;

    p.vx += mx*ACC*SPD_P*dt; p.vy += my*ACC*SPD_P*dt;
    p.vx *= Math.pow(PDAMP, dt); p.vy *= Math.pow(PDAMP, dt);
    var sp = Math.sqrt(p.vx*p.vx+p.vy*p.vy);
    if(sp>maxv){ p.vx = p.vx/sp*maxv; p.vy = p.vy/sp*maxv; }
    p.x += p.vx*dt; p.y += p.vy*dt;

    // oyuncu sınırları (saha dışına biraz çıkabilir, kale arkası dahil)
    if(p.x < PR) { p.x = PR; p.vx = 0; }
    if(p.x > W-PR) { p.x = W-PR; p.vx = 0; }
    if(p.y < PR) { p.y = PR; p.vy = 0; }
    if(p.y > H-PR) { p.y = H-PR; p.vy = 0; }

    // baslama vurusu: top oyuna girene dek herkes kendi yarisinda,
    // rakip takim orta yuvarlaga da giremez
    if(G.ko && play){
      var isKo = (p.team===G.koTeam);
      if(p.team===0){
        var lim0 = W/2 - (isKo ? 0 : PR+4);
        if(p.x > lim0){ p.x = lim0; p.vx = 0; }
      } else {
        var lim1 = W/2 + (isKo ? 0 : PR+4);
        if(p.x < lim1){ p.x = lim1; p.vx = 0; }
      }
      if(!isKo){
        var cdx=p.x-W/2, cdy=p.y-H/2, cd=Math.sqrt(cdx*cdx+cdy*cdy);
        if(cd < 70+PR && cd>0){ p.x = W/2 + cdx/cd*(70+PR); p.y = H/2 + cdy/cd*(70+PR); }
      }
    }

    // olaylar (pas / şut)
    while(p.ev.length){
      var e = p.ev.shift();
      if(!play) continue;
      if(e==='shoot') tryKick(p, 'shoot');
      else if(e==='pass'){
        if(!tryKick(p, 'pass')) p.passReq = 700; // topsuzsa bottan pas iste
      }
    }
  }

  // oyuncu-oyuncu çarpışma
  for(var a=0;a<G.players.length;a++) for(var b=a+1;b<G.players.length;b++){
    var pa=G.players[a], pb=G.players[b];
    var dx=pb.x-pa.x, dy=pb.y-pa.y, d=Math.sqrt(dx*dx+dy*dy);
    if(d>0 && d<PR*2){
      var ov=(PR*2-d)/2, nx=dx/d, ny=dy/d;
      pa.x-=nx*ov; pa.y-=ny*ov; pb.x+=nx*ov; pb.y+=ny*ov;
    }
  }

  // top
  var ball = G.ball;
  // falso: sutu ceken oyuncu, top havadayken yon tuslariyla yana buker
  if(ball.ct > 0){
    ball.ct -= dt*TICK_MS;
    var ow = null;
    for(var oi=0;oi<G.players.length;oi++) if(G.players[oi].id===ball.cw){ ow=G.players[oi]; break; }
    if(ow && play){
      var cix = (ow.in.r?1:0)-(ow.in.l?1:0), ciy = (ow.in.d?1:0)-(ow.in.u?1:0);
      if(cix!==0 || ciy!==0){
        var bl = Math.sqrt(ball.vx*ball.vx+ball.vy*ball.vy);
        if(bl > 0.6){
          var ux=ball.vx/bl, uy=ball.vy/bl;
          var dot=cix*ux+ciy*uy;
          var perx=cix-dot*ux, pery=ciy-dot*uy;
          var pl=Math.sqrt(perx*perx+pery*pery);
          if(pl>0.01){ ball.vx += perx/pl*0.085*dt; ball.vy += pery/pl*0.085*dt; }
        }
      }
    }
    if(ball.ct<=0){ ball.cw=null; ball.ct=0; }
  }
  // alt adimlarla hareket: hizli topun oyuncu/duvar icinden gecmesini engeller
  var bsp = Math.sqrt(ball.vx*ball.vx + ball.vy*ball.vy);
  var nSub = Math.max(1, Math.ceil(bsp*dt/5));
  for(var sub=0; sub<nSub; sub++){
    ball.x += ball.vx*dt/nSub; ball.y += ball.vy*dt/nSub;

    // top - oyuncu çarpışması
    for(var i2=0;i2<G.players.length;i2++){
      var q = G.players[i2];
      var dx2=ball.x-q.x, dy2=ball.y-q.y, d2=Math.sqrt(dx2*dx2+dy2*dy2);
      if(d2>0 && d2 < PR+BR){
        var nx2=dx2/d2, ny2=dy2/d2;
        ball.x = q.x + nx2*(PR+BR);
        ball.y = q.y + ny2*(PR+BR);
        var rel = (ball.vx-q.vx)*nx2 + (ball.vy-q.vy)*ny2;
        if(rel<0){ ball.vx -= 1.3*rel*nx2; ball.vy -= 1.3*rel*ny2; }
        ball.vx += q.vx*0.18; ball.vy += q.vy*0.18;
        ball.cw = null; ball.ct = 0; // dokunus falsoyu bitirir
        G.ko = false;
      }
    }

    // top duvarları: üst/alt saha çizgisi, sol/sağ kale ağzı hariç
    if(ball.y < PY0+BR){ ball.y = PY0+BR; ball.vy = -ball.vy*BOUNCE; }
    if(ball.y > PY1-BR){ ball.y = PY1-BR; ball.vy = -ball.vy*BOUNCE; }
    var mouth = ball.y > GY0 && ball.y < GY1;
    if(!mouth){
      if(ball.x < PX0+BR){ ball.x = PX0+BR; ball.vx = -ball.vx*BOUNCE; }
      if(ball.x > PX1-BR){ ball.x = PX1-BR; ball.vx = -ball.vx*BOUNCE; }
    } else {
      // kale içi arka ve yan ağlar
      if(ball.x < PX0-GOAL_DEPTH+BR){ ball.x = PX0-GOAL_DEPTH+BR; ball.vx = -ball.vx*0.4; }
      if(ball.x > PX1+GOAL_DEPTH-BR){ ball.x = PX1+GOAL_DEPTH-BR; ball.vx = -ball.vx*0.4; }
      if(ball.x < PX0 || ball.x > PX1){
        if(ball.y < GY0+BR){ ball.y=GY0+BR; ball.vy=-ball.vy*0.4; }
        if(ball.y > GY1-BR){ ball.y=GY1-BR; ball.vy=-ball.vy*0.4; }
      }
    }
  }
  ball.vx *= Math.pow(BDAMP, dt); ball.vy *= Math.pow(BDAMP, dt);
  var inMouth = ball.y > GY0 && ball.y < GY1;

  // gol kontrolü
  if(play){
    if(ball.x < PX0-BR && inMouth) scoreGoal(1);      // sol kaleye girdi -> mavi
    else if(ball.x > PX1+BR && inMouth) scoreGoal(0); // sağ kaleye -> kırmızı
  }
}

function scoreGoal(team){
  G.score[team]++;
  if(G.score[team] >= maxGoals){
    G.phase='end'; G.ptimer=4000;
    G.msg = (team===0?'KIRMIZI':'MAVİ') + ' MAÇI KAZANDI!';
    G.koTeam = 0; // yeni mac hep kirmizi baslar
  } else {
    G.phase='goal'; G.ptimer=2200;
    G.msg = (team===0?'KIRMIZI':'MAVİ') + ' GOL!';
    G.koTeam = 1 - team; // golu yiyen takim baslar
  }
}

function tryKick(p, kind){
  if(p.kcd>0) return false;
  var ball=G.ball;
  if(dist(p, ball) > KICK_RANGE) return false;
  var tx, ty, spd;
  if(kind==='pass'){
    var mate = nearestMate(p);
    if(mate){ tx = mate.x - ball.x; ty = mate.y - ball.y; }
    else { tx = p.fx; ty = p.fy; }
    spd = PASS_SPD;
  } else {
    // şut: yön tuşu basılıysa o yöne, değilse rakip kaleye
    if(p.fx!==0 || p.fy!==0){ tx=p.fx; ty=p.fy; }
    else { tx = (p.team===0?PX1:PX0) - ball.x; ty = (GY0+GY1)/2 - ball.y; }
    spd = SHOOT_SPD;
  }
  var l = Math.sqrt(tx*tx+ty*ty) || 1;
  spd *= SPD_B;
  ball.vx = tx/l*spd; ball.vy = ty/l*spd;
  if(kind==='shoot'){ ball.cw = p.id; ball.ct = 850; }
  else { ball.cw = null; ball.ct = 0; }
  G.ko = false;
  p.flash = 160;
  p.kcd = 220;
  return true;
}

function nearestMate(p){
  var best=null, bd=1e9;
  for(var i=0;i<G.players.length;i++){
    var q=G.players[i];
    if(q===p || q.team!==p.team) continue;
    var d=dist(p,q);
    if(d<bd){ bd=d; best=q; }
  }
  return best;
}

/* ================= BOT YAPAY ZEKASI ================= */
function botThink(){
  var ball=G.ball;
  for(var t=0;t<2;t++){
    var team = G.players.filter(function(p){return p.team===t;});
    var ownGX = t===0 ? PX0 : PX1, ownGY = (GY0+GY1)/2;
    // kaleci: kendi kalesine en yakin bot (takimda birden fazla bot varsa)
    var keeper=null;
    var botCount = team.filter(function(p){return p.bot;}).length;
    if(botCount > 1){
      var kd=1e9;
      for(var ki=0;ki<team.length;ki++){
        var kp=team[ki];
        if(!kp.bot) continue;
        var d0=Math.abs(kp.x-ownGX)+Math.abs(kp.y-ownGY)*0.4;
        if(d0<kd){ kd=d0; keeper=kp; }
      }
    }
    // topa en yakın takım üyesi hücumcu (kaleci haric; top kaleye yakinsa kaleci mudahale eder)
    var ballNearGoal = Math.abs(ball.x-ownGX) < 150 && ball.y > GY0-60 && ball.y < GY1+60;
    var chaser=null, bd=1e9;
    for(var i=0;i<team.length;i++){
      if(team[i]===keeper && !ballNearGoal) continue;
      var d=dist(team[i],ball);
      if(d<bd){ bd=d; chaser=team[i]; }
    }
    var slot=0;
    for(var i2=0;i2<team.length;i2++){
      var p=team[i2];
      if(!p.bot){ slot++; continue; }
      p.in={u:0,d:0,l:0,r:0,s:0};
      var hasBall = dist(p,ball) < KICK_RANGE;

      if(p===keeper && p!==chaser && !hasBall){
        // kale cizgisinde topu takip et
        var kx = t===0 ? PX0+42 : PX1-42;
        var kyy = Math.max(GY0+14, Math.min(GY1-14, ball.y));
        moveBot(p, kx, kyy, false);
        slot++;
        continue;
      }

      if(hasBall){
        if(p===keeper){
          // kaleci topu uzaklastirir: rakip yari sahaya
          kickToward(p, t===0 ? W*0.72 : W*0.28, PY0 + rnd(0.2,0.8)*(PY1-PY0), SHOOT_SPD);
          slot++;
          continue;
        }
        // insan takım arkadaşı pas istedi mi?
        var req = null;
        for(var j=0;j<team.length;j++)
          if(!team[j].bot && team[j].passReq>0 && team[j]!==p){ req=team[j]; break; }
        var gx = t===0?PX1:PX0, gy=(GY0+GY1)/2;
        if(req){
          kickToward(p, req.x, req.y, PASS_SPD); req.passReq=0;
        } else if(Math.abs(p.x-gx) < 320){
          kickToward(p, gx, gy + rnd(-GOAL_H*0.32, GOAL_H*0.32), SHOOT_SPD);
        } else if(Math.random()<0.012){
          var m = nearestMate(p);
          if(m) kickToward(p, m.x, m.y, PASS_SPD);
        } else {
          // top sür: kaleye doğru yürü
          moveBot(p, gx, gy, false);
        }
      } else if(p===chaser){
        var sprint = dist(p,ball) > 120 && p.stamina > 35 && !p.lock;
        moveBot(p, ball.x, ball.y, sprint);
      } else {
        // dizil: topun konumuna göre kaydırılmış formasyon
        var frac=(slot+1)/(team.length+1);
        var homeX = t===0 ? PX0+180 : PX1-180;
        var tx = homeX + (ball.x - W/2)*0.35;
        var ty = PY0 + frac*(PY1-PY0) + (ball.y - H/2)*0.25;
        moveBot(p, tx, ty, false);
      }
      slot++;
    }
  }
}

function moveBot(p, tx, ty, sprint){
  var dx=tx-p.x, dy=ty-p.y;
  if(Math.abs(dx)>6){ if(dx>0) p.in.r=1; else p.in.l=1; }
  if(Math.abs(dy)>6){ if(dy>0) p.in.d=1; else p.in.u=1; }
  if(sprint) p.in.s=1;
}

function kickToward(p, tx, ty, spd){
  if(p.kcd>0) return;
  var ball=G.ball;
  var dx=tx-ball.x, dy=ty-ball.y, l=Math.sqrt(dx*dx+dy*dy)||1;
  spd *= SPD_B;
  ball.vx=dx/l*spd; ball.vy=dy/l*spd;
  ball.cw=null; ball.ct=0;
  G.ko=false;
  p.flash=160;
  p.kcd=350;
}

/* ================= AĞ ================= */
function startHost(withCode){
  var code = code5();
  peer = new Peer('ballclub-' + code);
  peer.on('open', function(){
    roomCode = withCode ? code : null;
    el('roomInfo').textContent = withCode ? ('Oda Kodu: ' + code) : 'Yerel oyun';
    if(withCode) el('copyBtn').style.display = '';
    startGameUI();
  });
  peer.on('connection', function(conn){
    conn.on('open', function(){});
    conn.on('data', function(msg){ hostOnData(conn, msg); });
    conn.on('close', function(){ hostDrop(conn.peer); });
    conn.on('error', function(){ hostDrop(conn.peer); });
  });
  peer.on('error', function(err){
    if(err.type==='unavailable-id'){ startHost(withCode); }
    else menuMsg('Bağlantı hatası: ' + err.type);
  });
}

function hostOnData(conn, msg){
  if(msg.t==='hi'){
    conns[conn.peer] = conn;
    var h0 = G.players.filter(function(p){return p.team===0 && !p.bot;}).length;
    var h1 = G.players.filter(function(p){return p.team===1 && !p.bot;}).length;
    var hasBot = function(t){ return G.players.some(function(p){return p.team===t && p.bot;}); };
    var want = msg.tm==='0' ? 0 : (msg.tm==='1' ? 1 : null);
    var team;
    if(want!==null && hasBot(want)) team = want;               // istedigi takimda bot yeri var
    else if(want!==null && hasBot(1-want)) team = 1-want;      // istedigi dolu, diger takima
    else team = h1 < h0 ? 1 : 0;                               // otomatik: az insanli takima
    var bot = G.players.find(function(p){return p.team===team && p.bot;});
    var np;
    if(bot){ bot.bot=false; bot.id=conn.peer; bot.name=msg.n||'Misafir'; bot.stamina=STAM_MAX; np=bot; }
    else {
      np = newPlayer(conn.peer, msg.n||'Misafir', team, false);
      G.players.push(np);
    }
    np.in={u:0,d:0,l:0,r:0,s:0};
    conn.send({t:'wel', pid:conn.peer, fs:fieldSize});
  } else if(msg.t==='in'){
    var p = G.players.find(function(q){return q.id===conn.peer;});
    if(p) p.in = msg.k;
  } else if(msg.t==='set'){
    if(msg.pw===SET_PW){
      if(typeof msg.sp==='number') SPD_P = Math.min(2, Math.max(0.5, msg.sp));
      if(typeof msg.sb==='number') SPD_B = Math.min(2, Math.max(0.5, msg.sb));
      if(typeof msg.am==='number') AIM_M = Math.min(3, Math.max(0.2, msg.am));
      if(msg.tp) G.paused = !G.paused;
    }
  } else if(msg.t==='ev'){
    var p2 = G.players.find(function(q){return q.id===conn.peer;});
    if(p2) p2.ev.push(msg.a);
  }
}

function hostDrop(pid){
  delete conns[pid];
  var p = G.players.find(function(q){return q.id===pid;});
  if(p){ p.bot=true; p.name='Bot ('+p.name+')'; p.in={u:0,d:0,l:0,r:0,s:0}; }
}

function broadcast(){
  var st = { t:'st',
    p: G.players.map(function(p){ return { i:p.id, n:p.name, t:p.team, b:p.bot?1:0,
        x:Math.round(p.x*10)/10, y:Math.round(p.y*10)/10, st:Math.round(p.stamina), lk:p.lock?1:0,
        fx:Math.round(p.fx*100)/100, fy:Math.round(p.fy*100)/100, fl:p.flash>0?1:0 }; }),
    b: [Math.round(G.ball.x*10)/10, Math.round(G.ball.y*10)/10],
    s: G.score, ph: G.phase, m: G.msg, pa: G.paused?1:0, cf:[SPD_P,SPD_B,AIM_M],
    ko: (G.ko && G.phase==='play')?1:0, kt: G.koTeam };
  for(var k in conns){ try{ conns[k].send(st); }catch(e){} }
}

function startClient(code){
  peer = new Peer();
  peer.on('open', function(){
    hostConn = peer.connect('ballclub-' + code.toUpperCase(), {reliable:true});
    var ok=false;
    hostConn.on('open', function(){
      hostConn.send({t:'hi', n:myName, tm:myTeamPref});
    });
    hostConn.on('data', function(msg){
      if(msg.t==='wel'){ ok=true; myPid=msg.pid; roomCode=code.toUpperCase(); setField(msg.fs); startGameUI();
        el('roomInfo').textContent='Odaya bağlı: '+roomCode; el('copyBtn').style.display=''; }
      else if(msg.t==='st'){
        G = msg;
        if(msg.cf){ SPD_P=msg.cf[0]; SPD_B=msg.cf[1]; AIM_M=msg.cf[2]; }
        if(!Gr) Gr = JSON.parse(JSON.stringify(msg));
      }
    });
    hostConn.on('close', function(){ if(running){ alert('Sunucuyla bağlantı koptu.'); location.reload(); } });
    hostConn.on('error', function(){ menuMsg('Odaya bağlanılamadı.'); });
    setTimeout(function(){ if(!ok && !running) menuMsg('Oda bulunamadı. Kodu kontrol et.'); }, 6000);
  });
  peer.on('error', function(err){ menuMsg('Bağlantı hatası: ' + err.type); });
}

/* ================= DÖNGÜ ================= */
function startGameUI(){
  el('menu').style.display='none';
  el('gameWrap').style.display='flex';
  running = true; lastT = performance.now();
  requestAnimationFrame(loop);
}

function loop(now){
  if(!running) return;
  var dtms = Math.min(50, now - lastT); lastT = now;
  if(role==='host'){
    if(G.paused){ acc = 0; }
    else {
      acc += dtms;
      while(acc >= TICK_MS){ stepGame(1); acc -= TICK_MS; }
    }
    netAcc += dtms;
    if(netAcc >= NET_MS){ broadcast(); netAcc = 0; }
    render(hostView());
  } else {
    if(G && Gr){
      // yumuşatma
      var t = 0.35;
      for(var i=0;i<G.p.length;i++){
        var tp=G.p[i];
        var rp=null;
        for(var j=0;j<Gr.p.length;j++) if(Gr.p[j].i===tp.i){ rp=Gr.p[j]; break; }
        if(!rp){ Gr.p.push(JSON.parse(JSON.stringify(tp))); continue; }
        rp.x += (tp.x-rp.x)*t; rp.y += (tp.y-rp.y)*t;
        rp.n=tp.n; rp.t=tp.t; rp.b=tp.b; rp.st=tp.st; rp.lk=tp.lk; rp.fl=tp.fl;
        if(typeof rp.fx!=='number'){ rp.fx=tp.fx; rp.fy=tp.fy; }
        rp.fx += (tp.fx-rp.fx)*t; rp.fy += (tp.fy-rp.fy)*t;
      }
      Gr.p = Gr.p.filter(function(rp){ return G.p.some(function(tp){return tp.i===rp.i;}); });
      Gr.b[0] += (G.b[0]-Gr.b[0])*t; Gr.b[1] += (G.b[1]-Gr.b[1])*t;
      Gr.s=G.s; Gr.ph=G.ph; Gr.m=G.m; Gr.pa=G.pa; Gr.ko=G.ko; Gr.kt=G.kt;
      render(Gr);
    }
  }
  requestAnimationFrame(loop);
}

function hostView(){
  return { p: G.players.map(function(p){return {i:p.id,n:p.name,t:p.team,b:p.bot?1:0,x:p.x,y:p.y,st:p.stamina,lk:p.lock?1:0,fx:p.fx,fy:p.fy,fl:p.flash>0?1:0};}),
           b:[G.ball.x,G.ball.y], s:G.score, ph:G.phase, m:G.msg, pa:G.paused?1:0,
           ko:(G.ko && G.phase==='play')?1:0, kt:G.koTeam };
}

/* ================= ÇİZİM ================= */
function render(v){
  ctx.clearRect(0,0,W,H);
  // saha
  ctx.fillStyle='#718C5A'; ctx.fillRect(0,0,W,H);
  // koyu şerit doku
  ctx.fillStyle='rgba(0,0,0,0.045)';
  for(var s=0;s<10;s+=2) ctx.fillRect(PX0 + s*(PX1-PX0)/10, PY0, (PX1-PX0)/10, PY1-PY0);
  // çizgiler
  ctx.strokeStyle='#C7D6B5'; ctx.lineWidth=3;
  ctx.strokeRect(PX0,PY0,PX1-PX0,PY1-PY0);
  ctx.beginPath(); ctx.moveTo(W/2,PY0); ctx.lineTo(W/2,PY1); ctx.stroke();
  ctx.beginPath(); ctx.arc(W/2,H/2,70,0,Math.PI*2); ctx.stroke();
  ctx.fillStyle='#C7D6B5';
  ctx.beginPath(); ctx.arc(W/2,H/2,4,0,Math.PI*2); ctx.fill();
  // kaleler
  drawGoal(PX0, -1); drawGoal(PX1, 1);
  // top gölgesi + top
  var bx=v.b[0], by=v.b[1];
  ctx.fillStyle='rgba(0,0,0,0.18)';
  ctx.beginPath(); ctx.ellipse(bx+2,by+3,BR,BR*0.7,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#FFFFFF'; ctx.strokeStyle='#1B2125'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.arc(bx,by,BR,0,Math.PI*2); ctx.fill(); ctx.stroke();
  // oyuncular
  for(var i=0;i<v.p.length;i++){
    var p=v.p[i];
    var me = (p.i===myPid);
    var flash = !!p.fl; // sadece topa vurulan anda yanar
    ctx.fillStyle = p.t===0 ? '#E56E56' : '#5689E5';
    ctx.strokeStyle = flash ? '#FFFFFF' : '#1B2125';
    ctx.lineWidth = flash ? 3.5 : 2;
    ctx.beginPath(); ctx.arc(p.x,p.y,PR,0,Math.PI*2); ctx.fill(); ctx.stroke();
    if(me){
      // dairesel imlec + bakis yonu noktasi
      var fl = Math.sqrt((p.fx||0)*(p.fx||0)+(p.fy||0)*(p.fy||0)) || 1;
      var fnx=(p.fx||1)/fl, fny=(p.fy||0)/fl;
      ctx.strokeStyle='rgba(255,255,255,0.45)'; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.arc(p.x,p.y,PR+7,0,Math.PI*2); ctx.stroke();
      ctx.fillStyle='#FFFFFF';
      ctx.beginPath(); ctx.arc(p.x+fnx*(PR+7), p.y+fny*(PR+7), 3.2, 0, Math.PI*2); ctx.fill();
    }
    ctx.fillStyle = me ? '#FFFFFF' : 'rgba(255,255,255,0.85)';
    ctx.font = (me?'bold ':'')+'11px Segoe UI, Arial';
    ctx.textAlign='center';
    ctx.fillText((p.b?'[B] ':'')+p.n, p.x, p.y+PR+14);
  }
  // baslama vurusu bildirimi
  if(v.ko && !v.pa && !v.m){
    ctx.fillStyle='rgba(27,33,37,0.55)';
    ctx.font='bold 15px Segoe UI, Arial'; ctx.textAlign='center';
    var kn = v.kt===0 ? 'KIRMIZI' : 'MAVİ';
    ctx.fillStyle = v.kt===0 ? '#E56E56' : '#5689E5';
    ctx.fillText('Başlama vuruşu: ' + kn, W/2, PY0 - 12);
  }
  // duraklatma
  if(v.pa){
    ctx.fillStyle='rgba(27,33,37,0.6)';
    ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#FFFFFF'; ctx.font='bold 34px Segoe UI, Arial'; ctx.textAlign='center';
    ctx.fillText('MAÇ DURDURULDU', W/2, H/2+12);
  }
  var pb2 = el('pauseBtn2');
  pb2.textContent = v.pa ? 'Maçı Devam Ettir' : 'Maçı Durdur';
  // mesaj
  if(v.m && !v.pa){
    ctx.fillStyle='rgba(27,33,37,0.75)';
    ctx.fillRect(0, H/2-42, W, 84);
    ctx.fillStyle='#FFFFFF'; ctx.font='bold 34px Segoe UI, Arial'; ctx.textAlign='center';
    ctx.fillText(v.m, W/2, H/2+12);
  }
  // HUD
  el('scR').textContent=v.s[0]; el('scB').textContent=v.s[1];
  var mep=null;
  for(var k=0;k<v.p.length;k++) if(v.p[k].i===myPid){ mep=v.p[k]; break; }
  if(mep){
    var f=el('stamFill');
    f.style.width = Math.max(0,Math.min(100,mep.st)) + '%';
    f.style.background = mep.lk ? '#B04B4B' : (mep.st<STAM_UNLOCK ? '#D89A3E' : '#E5B356');
  }
}

function drawGoal(x, dir){
  // dir: -1 sol, 1 sağ
  ctx.strokeStyle='#EDEDED'; ctx.lineWidth=3;
  var back = x + dir*GOAL_DEPTH;
  ctx.strokeRect(Math.min(x,back), GY0, GOAL_DEPTH, GY1-GY0);
  // ağ
  ctx.strokeStyle='rgba(255,255,255,0.35)'; ctx.lineWidth=1;
  for(var yy=GY0+10; yy<GY1; yy+=12){
    ctx.beginPath(); ctx.moveTo(x,yy); ctx.lineTo(back,yy); ctx.stroke();
  }
  // direkler
  ctx.fillStyle='#FFFFFF';
  ctx.beginPath(); ctx.arc(x,GY0,5,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x,GY1,5,0,Math.PI*2); ctx.fill();
}

/* ================= GİRİŞ ================= */
var DEF_BINDS = { u:'KeyW', d:'KeyS', l:'KeyA', r:'KeyD', s:'ShiftLeft', pass:'KeyX', shoot:'Space' };
var BIND_LABELS = { u:'Yukarı', d:'Aşağı', l:'Sol', r:'Sağ', s:'Sprint', pass:'Pas', shoot:'Şut' };
var binds = loadBinds();
var listenAction = null; // su an tus bekleyen eylem

function loadBinds(){
  try {
    var s = localStorage.getItem('bc2d_binds');
    if(s){ var o = JSON.parse(s); for(var k in DEF_BINDS) if(!o[k]) o[k]=DEF_BINDS[k]; return o; }
  } catch(e){}
  return JSON.parse(JSON.stringify(DEF_BINDS));
}
function saveBinds(){ try{ localStorage.setItem('bc2d_binds', JSON.stringify(binds)); }catch(e){} }

function normCode(c){ return (c==='ShiftRight') ? 'ShiftLeft' : c; }
function keyLabel(c){
  if(c==='ShiftLeft') return 'Shift';
  if(c==='Space') return 'Space';
  if(c.indexOf('Key')===0) return c.slice(3);
  if(c.indexOf('Digit')===0) return c.slice(5);
  if(c.indexOf('Arrow')===0) return {ArrowUp:'↑ Yukarı Ok',ArrowDown:'↓ Aşağı Ok',ArrowLeft:'← Sol Ok',ArrowRight:'→ Sağ Ok'}[c] || c;
  return c;
}

function keySet(e, down){
  var c = normCode(e.code);
  // tus atama modu
  if(listenAction && down){
    e.preventDefault();
    if(c!=='Escape') binds[listenAction] = c;
    listenAction = null;
    saveBinds(); renderKeyRows();
    return;
  }
  var hit=false;
  // ESC: oyunu kuran kisi maci durdurur / devam ettirir
  if(c==='Escape' && down && !e.repeat && running && role==='host' && G){
    G.paused = !G.paused;
    e.preventDefault();
    return;
  }
  if(c===binds.u){ keys.u=down; hit=true; }
  if(c===binds.d){ keys.d=down; hit=true; }
  if(c===binds.l){ keys.l=down; hit=true; }
  if(c===binds.r){ keys.r=down; hit=true; }
  if(c===binds.s){ keys.s=down; hit=true; }
  if(c===binds.pass){ if(down && !e.repeat) sendEvent('pass'); hit=true; }
  if(c===binds.shoot){ if(down && !e.repeat) sendEvent('shoot'); hit=true; }
  // yon oklari: baska bir eyleme atanmadiysa her zaman hareket
  if(!hit){
    if(c==='ArrowUp'){ keys.u=down; hit=true; }
    else if(c==='ArrowDown'){ keys.d=down; hit=true; }
    else if(c==='ArrowLeft'){ keys.l=down; hit=true; }
    else if(c==='ArrowRight'){ keys.r=down; hit=true; }
  }
  if(hit && running) e.preventDefault();
  if(hit) pushKeys();
}
document.addEventListener('keydown', function(e){ keySet(e,1); });
document.addEventListener('keyup', function(e){ keySet(e,0); });

function renderKeyRows(){
  var host = el('keyRows');
  host.innerHTML = '';
  for(var a in DEF_BINDS){
    (function(action){
      var row = document.createElement('div'); row.className='keyRow';
      var lab = document.createElement('span'); lab.textContent = BIND_LABELS[action];
      var btn = document.createElement('button');
      if(listenAction===action){ btn.textContent='Tuşa bas...'; btn.className='listen'; }
      else btn.textContent = keyLabel(binds[action]);
      btn.onclick = function(){ listenAction = action; renderKeyRows(); };
      row.appendChild(lab); row.appendChild(btn);
      host.appendChild(row);
    })(a);
  }
}

function pushKeys(){
  if(!running) return;
  if(role==='host'){
    var p = G && G.players.find(function(q){return q.id===myPid;});
    if(p) p.in = {u:keys.u,d:keys.d,l:keys.l,r:keys.r,s:keys.s};
  } else if(hostConn && hostConn.open){
    var s = ''+keys.u+keys.d+keys.l+keys.r+keys.s;
    if(s!==lastSentKeys){
      lastSentKeys=s;
      hostConn.send({t:'in', k:{u:keys.u,d:keys.d,l:keys.l,r:keys.r,s:keys.s}});
    }
  }
}

function sendEvent(a){
  if(!running) return;
  if(role==='host'){
    var p = G && G.players.find(function(q){return q.id===myPid;});
    if(p) p.ev.push(a);
  } else if(hostConn && hostConn.open){
    hostConn.send({t:'ev', a:a});
  }
}

/* ================= MENÜ ================= */
function menuMsg(s){ el('menuMsg').textContent = s; }
function readMenu(){
  myName = el('nameInp').value.trim() || 'Oyuncu';
  teamSize = parseInt(el('sizeSel').value, 10);
  maxGoals = parseInt(el('goalSel').value, 10);
  myTeamPref = el('teamSel').value;
  if(role!=='client'){
    setField(el('fieldSel').value);
    SPD_P = parseInt(el('pspdInp').value, 10) / 100;
    SPD_B = parseInt(el('bspdInp').value, 10) / 100;
  }
}

el('soloBtn').onclick = function(){
  readMenu(); role='host'; myPid='host';
  initGame();
  el('roomInfo').textContent='Yerel oyun (botlara karşı)';
  startGameUI();
};

el('hostBtn').onclick = function(){
  readMenu(); role='host'; myPid='host';
  menuMsg('Oda kuruluyor...');
  initGame();
  startHost(true);
};

el('joinBtn').onclick = function(){
  el('joinRow').style.display='block';
  el('codeInp').focus();
};

el('joinGoBtn').onclick = function(){
  role='client';
  readMenu();
  var code = el('codeInp').value.trim();
  if(code.length<5){ menuMsg('5 haneli oda kodunu gir.'); return; }
  menuMsg('Bağlanılıyor...');
  startClient(code);
};

el('copyBtn').onclick = function(){
  if(!roomCode) return;
  var btn = this;
  function done(){ btn.textContent='Kopyalandı!'; setTimeout(function(){ btn.textContent='Kopyala'; }, 1500); }
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(roomCode).then(done, function(){ fallbackCopy(); done(); });
  } else { fallbackCopy(); done(); }
  function fallbackCopy(){
    var ta=document.createElement('textarea'); ta.value=roomCode;
    document.body.appendChild(ta); ta.select();
    try{ document.execCommand('copy'); }catch(e){}
    document.body.removeChild(ta);
  }
};

el('keysBtn').onclick = function(){
  var p = el('keyPanel');
  var open = p.style.display==='block';
  el('setPanel').style.display='none';
  p.style.display = open ? 'none' : 'block';
  if(!open) renderKeyRows();
  listenAction = null;
};

el('keyReset').onclick = function(){
  binds = JSON.parse(JSON.stringify(DEF_BINDS));
  listenAction = null;
  saveBinds(); renderKeyRows();
};

el('gearBtn').onclick = function(){
  el('keyPanel').style.display='none';
  var p = el('setPanel');
  var open = p.style.display==='block';
  p.style.display = open ? 'none' : 'block';
  if(!open){
    el('setLock').style.display = setUnlocked ? 'none' : 'block';
    el('setBody').style.display = setUnlocked ? 'block' : 'none';
    if(!setUnlocked){ el('pwInp').value=''; el('pwMsg').textContent=''; el('pwInp').focus(); }
    else syncPanel();
  }
};

function syncPanel(){
  el('gpInp').value = Math.round(SPD_P*100);
  el('gbInp').value = Math.round(SPD_B*100);
  el('gaInp').value = Math.round(AIM_M*100);
  el('gpVal').textContent = Math.round(SPD_P*100)+'%';
  el('gbVal').textContent = Math.round(SPD_B*100)+'%';
  el('gaVal').textContent = Math.round(AIM_M*100)+'%';
}

el('pwBtn').onclick = function(){
  if(el('pwInp').value === SET_PW){
    setUnlocked = true;
    el('setLock').style.display='none';
    el('setBody').style.display='block';
    syncPanel();
  } else {
    el('pwMsg').textContent = 'Yanlış şifre.';
  }
};
el('pwInp').addEventListener('keydown', function(e){ if(e.key==='Enter') el('pwBtn').onclick(); e.stopPropagation(); });

function applyLive(){
  var sp = parseInt(el('gpInp').value,10)/100;
  var sb = parseInt(el('gbInp').value,10)/100;
  var am = parseInt(el('gaInp').value,10)/100;
  el('gpVal').textContent = Math.round(sp*100)+'%';
  el('gbVal').textContent = Math.round(sb*100)+'%';
  el('gaVal').textContent = Math.round(am*100)+'%';
  if(role==='host'){ SPD_P=sp; SPD_B=sb; AIM_M=am; }
  else if(hostConn && hostConn.open){ hostConn.send({t:'set', pw:SET_PW, sp:sp, sb:sb, am:am}); }
}
el('gpInp').oninput = applyLive;
el('gbInp').oninput = applyLive;
el('gaInp').oninput = applyLive;

el('pauseBtn2').onclick = function(){
  if(role==='host'){ G.paused = !G.paused; }
  else if(hostConn && hostConn.open){ hostConn.send({t:'set', pw:SET_PW, tp:1}); }
};

el('pspdInp').oninput = function(){ el('pspdVal').textContent = this.value + '%'; };
el('bspdInp').oninput = function(){ el('bspdVal').textContent = this.value + '%'; };

el('leaveBtn').onclick = function(){ location.reload(); };
</script>
